#===============================================================================
# --- GENERAL ---
#===============================================================================
#ini config termainal default , secara default adalah bash, kalau tidak di config tetap bash yang berjalan default nya
# tinggal ganti file bin dari teminal yang kita ingin kan
set-option -g default-shell /bin/zsh


# ini bawaan dari tmux
# Set terminal untuk mendukung 256 warna
set -g default-terminal "screen-256color"
# Aktifkan true color support
set -as terminal-overrides ",xterm*:Tm"

# Perpanjang history/scrollback buffer
set -g history-limit 10000

#---------- 
# ini config cadangan
# set -g default-terminal "xterm-kitty"
# set -g allow-passthrough on
# set -ga terminal-overrides ",xterm-kitty:Tc"
#----------

# anda bisa gati 1 dengan 3 untuk bliking underline atau 5 untuk blinking bar
# Mulai penomoran window dan pane dari 1, bukan 0
set -g base-index 1
setw -g pane-base-index 1

# Kurangi delay saat menekan tombol escape (penting untuk editor seperti Vim)
set -g escape-time 0

# Izinkan penggantian nama window secara otomatis
setw -g automatic-rename on

# Set judul window agar merefleksikan program yang sedang berjalan
set -g set-titles on
set -g set-titles-string '#H:#S.#I.#P #{pane_title} - #{b:pane_current_path}'

# Aktifkan focus events (berguna untuk beberapa aplikasi terminal)
set -g focus-events on


#aktifkan mouse
set -g mouse on
set-window-option -g mode-keys vi

#===============================================================================
# --- KEYBINDINGS (PINTASAN KEYBOARD) ---
#===============================================================================
# Ubah tombol prefix dari C-b (Ctrl+b) ke C-a (Ctrl+a)
# C-a lebih mudah dijangkau dan merupakan standar dari 'screen'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload konfigurasi tmux dengan cepat menggunakan Prefix + r
bind r source-file ~/.tmux.conf \; display "Konfigurasi di-reload!"

# Membagi pane secara intuitif
# Prefix + | untuk split vertikal
bind | split-window -h -c "#{pane_current_path}"
# Prefix + - untuk split horizontal
bind - split-window -v -c "#{pane_current_path}"

# Pindah antar pane menggunakan tombol panah tanpa prefix (dengan Alt)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mengubah ukuran pane dengan lebih mudah (tahan Prefix lalu panah)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# agar dapat bergerak hjkl pada mode copy di prefix [,
setw -g mode-keys vi

# Gunakan y untuk copy dan kirim ke clipboard (xclip)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Buat window baru di direktori yang sama
bind c new-window -c "#{pane_current_path}"

# pindah window dengan mode vim h ke kiri / previous , dan l ke kanan / next
bind h previous-window
bind l next-window
