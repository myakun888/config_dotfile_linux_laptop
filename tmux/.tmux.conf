#===============================================================================
# --- MOUSE SUPPORT ---
#===============================================================================
# Aktifkan mode mouse
# - Bisa klik untuk memilih window atau pane
# - Bisa drag untuk mengubah ukuran pane
# - Bisa scroll di dalam pane
set -g mouse on


